<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Ibrahim Alobaid — AI Engineer</title>
  <desc id="desc">Dark teal professional banner for an AI engineer specializing in LLMs, multimodal AI, and voice agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080c14"/>
      <stop offset="0.5" stop-color="#0c2633"/>
      <stop offset="1" stop-color="#063b43"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#6ee7f9" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="18" fill="url(#grid)"/>
  <ellipse cx="600" cy="175" rx="420" ry="210" fill="url(#glow)" filter="url(#blur)"/>

  <g fill="none" stroke="#67e8f9" stroke-opacity="0.35" stroke-width="1.5">
    <path d="M55 82 L125 42 L190 76 L251 48"/>
    <path d="M62 226 L128 187 L188 220 L258 180"/>
    <path d="M945 57 L1008 96 L1071 58 L1143 98"/>
    <path d="M937 237 L1003 198 L1072 230 L1146 185"/>
  </g>
  <g fill="#2dd4bf">
    <circle cx="55" cy="82" r="4"/><circle cx="125" cy="42" r="4"/><circle cx="190" cy="76" r="4"/><circle cx="251" cy="48" r="4"/>
    <circle cx="62" cy="226" r="4"/><circle cx="128" cy="187" r="4"/><circle cx="188" cy="220" r="4"/><circle cx="258" cy="180" r="4"/>
    <circle cx="945" cy="57" r="4"/><circle cx="1008" cy="96" r="4"/><circle cx="1071" cy="58" r="4"/><circle cx="1143" cy="98" r="4"/>
    <circle cx="937" cy="237" r="4"/><circle cx="1003" cy="198" r="4"/><circle cx="1072" cy="230" r="4"/><circle cx="1146" cy="185" r="4"/>
  </g>

  <g transform="translate(97 113)">
    <circle cx="48" cy="48" r="47" fill="#0b1822" stroke="url(#accent)" stroke-width="2"/>
    <path d="M24 58 C31 36 39 67 48 42 C56 21 63 73 72 43" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="24" cy="58" r="4" fill="#22d3ee"/><circle cx="48" cy="42" r="4" fill="#2dd4bf"/><circle cx="72" cy="43" r="4" fill="#22d3ee"/>
  </g>

  <g text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="600" y="130" fill="#f0f6fc" font-size="52" font-weight="700" letter-spacing="1.5">IBRAHIM ALOBAID</text>
    <rect x="393" y="153" width="414" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="600" y="196" fill="#7dd3fc" font-size="22" font-weight="600" letter-spacing="3">AI ENGINEER</text>
    <text x="600" y="236" fill="#c9d1d9" font-size="18" letter-spacing="1.1">LLM SYSTEMS  ·  MULTIMODAL AI  ·  VOICE AGENTS</text>
  </g>

  <g transform="translate(1040 132)" fill="none" stroke="url(#accent)" stroke-width="2">
    <path d="M0 28 Q18 0 36 28 T72 28 T108 28"/>
    <path d="M0 48 Q18 20 36 48 T72 48 T108 48" opacity="0.45"/>
  </g>

  <rect x="1" y="1" width="1198" height="318" rx="17" fill="none" stroke="#67e8f9" stroke-opacity="0.16" stroke-width="2"/>
</svg>
